spring.application.name=webapp
server.port=8080
server.servlet.context-path=/webapp

logging.level.com.neu.webapp.mapper=debug

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/webapp?serverTimezone=UTC&useSSL=false&autoReconnect=true

spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=10000
spring.datasource.username=root
spring.datasource.password=Ap002245

mybatis-plus.mapper-locations=classpath:mapper/*.xml

mybatis-plus.type-aliases-package=com.neu.webapp.entity

admin.passcode=admin123456

server.servlet.session.timeout=30m
server.servlet.session.cookie.name=PARCEL_SESSIONID
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.path=/webapp

spring.jackson.date-format=yyyy-MM-dd HH:mm
spring.jackson.serialization.write-dates-as-timestamps=false
